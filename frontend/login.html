<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AR Shopping - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --gradient: linear-gradient(135deg,#ff6fd8,#8e2de2);
    --success:#16a34a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: url('https://cdn.pixabay.com/photo/2017/02/23/13/05/shopping-2091673_1280.jpg') no-repeat center center/cover;
}

.container{
    width:90%;
    max-width:1000px;
    display:flex;
    border-radius:25px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(15px);
    box-shadow:0 15px 50px rgba(0,0,0,0.2);
    overflow:hidden;
}

.left{
    flex:1;
    background:var(--gradient);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    padding:50px 40px;
    text-align:center;
}

.left h1{
    font-size:30px;
    margin-bottom:12px;
}

.left p{
    margin-bottom:20px;
}

.left img{
    width:220px;
}

.right{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 0;
}

.form-box{
    width:85%;
    max-width:360px;
}

.form-box h2{
    margin-bottom:8px;
    color:#8e2de2;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    font-size:13px;
}

.input-group input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:8px;
    background:#fafafa;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--gradient);
    color:white;
    font-weight:600;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(255,111,216,0.6);
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
    transform:none;
}

@media(max-width:900px){
    .container{
        flex-direction:column;
    }
    .left{
        display:none;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="left">
    <h1>Welcome Back</h1>
    <p>Login to Smart AR Shopping<br>Experience the future today</p>
    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
</div>

<div class="right">
<div class="form-box">

    <h2>Login 💜</h2>

    <form id="loginForm">

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="button" onclick="login()">Login</button>

    </form>

    <p style="text-align:center; margin-top:15px; font-size:13px;">
        Don\\'t have an account? <a href="register.html" style="color:#8e2de2; font-weight:500;">Register</a>
    </p>

</div>
</div>

</div>

<script src="js/page-utils.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
