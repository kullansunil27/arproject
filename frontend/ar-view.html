<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer - Smart AR Shopping</title>
  
  <script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: #1a1a2e;
      overflow: hidden;
      height: 100vh;
    }
    
    /* Fullscreen Viewer */
    .viewer-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    model-viewer {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    
    /* Control Panel */
    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      gap: 10px;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    
    .control-btn {
      background: linear-gradient(135deg, #ff6fd8, #8e2de2);
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.3s;
    }
    
    .control-btn:hover {
      transform: scale(1.05);
    }
    
    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(26, 26, 46, 0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }
    
    .header h2 {
      color: white;
      font-size: 18px;
    }
    
    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    
    /* Instructions */
    .instructions {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h2>🖥️ 3D Viewer</h2>
    <button class="close-btn" onclick="window.close()">✕ Close</button>
  </div>

  <!-- Instructions -->
  <div class="instructions">
    👆 Drag to rotate | Pinch to zoom | Two-finger drag to pan
  </div>

  <!-- 3D Viewer -->
  <div class="viewer-container">
    <model-viewer
    id="arModel"
    src=""
    camera-controls
    auto-rotate
    shadow-intensity="1"
    ar-placement="floor"
    environment-image="neutral"
    scale="1 1 1"
    min-scale="0.5"
    max-scale="5"
    style="width:100%; height:100vh;">
    </model-viewer>
  </div>

  <!-- Control Panel -->
  <div class="control-panel">
    <button class="control-btn" onclick="resetView()">🔄 Reset</button>
    <button class="control-btn" onclick="toggleAutoRotate()">⏯️ Auto Rotate</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const model = params.get("model");
    const modelViewer = document.getElementById("arModel");
    
    // Set the model source
    if (model) {
      modelViewer.src = model;
      console.log("Loading model:", model);
    } else {
      alert("No model specified!");
      window.close();
    }
    
    let autoRotate = true;
    
    // Toggle auto-rotate
    function toggleAutoRotate() {
      autoRotate = !autoRotate;
      modelViewer.autoRotate = autoRotate;
    }
    
    // Reset camera view
    function resetView() {
      // Reload the page to reset view
      modelViewer.src = "";
      setTimeout(() => {
        modelViewer.src = model;
      }, 100);
    }
    
    // Handle errors
    modelViewer.addEventListener("error", (e) => {
      console.error("Error loading model:", e);
      alert("Error loading 3D model!");
    });
  </script>

</body>

</html>
