<!DOCTYPE html>
<html>
<head>

<title>Your Orders</title>

<style>

body{
font-family:Segoe UI;
margin:0;
padding:40px;
background:linear-gradient(135deg,#ff6fd8,#8e2de2);
color:white;
}

.container{
max-width:900px;
margin:auto;
}

.orderCard{
background:rgba(0,0,0,0.3);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.progress{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.step{
text-align:center;
flex:1;
}

.circle{
width:25px;
height:25px;
border-radius:50%;
background:white;
margin:auto;
margin-bottom:5px;
}

.active{
background:#00ff9c;
}

button{
margin-top:15px;
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff6fd8,#8e2de2);
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Your Orders</h1>

<div id="ordersList"></div>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || []

let container=document.getElementById("ordersList")

function render(){

container.innerHTML=""

if(orders.length==0){
container.innerHTML="<h3>No Orders Yet</h3>"
return
}

orders.forEach((order,i)=>{

let s1=order.track>=1?"active":""
let s2=order.track>=2?"active":""
let s3=order.track>=3?"active":""
let s4=order.track>=4?"active":""

container.innerHTML+=`

<div class="orderCard">

<h3>${order.name}</h3>

<p>Order ID : ${order.id}</p>
<p>Date : ${order.date}</p>
<p>Price : ₹${order.price}</p>

<div class="progress">

<div class="step">
<div class="circle ${s1}"></div>
Order Placed
</div>

<div class="step">
<div class="circle ${s2}"></div>
Shipped
</div>

<div class="step">
<div class="circle ${s3}"></div>
Out for Delivery
</div>

<div class="step">
<div class="circle ${s4}"></div>
Delivered
</div>

</div>

<button onclick="updateStatus(${i})">Update Status</button>

</div>

`

})

}

function updateStatus(i){

if(orders[i].track<4){
orders[i].track++
}

localStorage.setItem("orders",JSON.stringify(orders))

render()

}

render()

</script>

</body>
</html>
