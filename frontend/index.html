<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AR Shopping</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --gradient: linear-gradient(135deg,#ff6fd8,#8e2de2);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:var(--gradient);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

/* PARTICLE CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* CENTER CONTAINER */
.container{
    perspective:1000px;
}

/* FLIP CARD */
.card{
    width:330px;
    height:330px;
    position:relative;
    transform-style:preserve-3d;
    animation:flipReveal 1.6s ease forwards;
}

/* FRONT & BACK */
.front, .back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.3);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
    box-shadow:0 0 40px rgba(255,255,255,0.3);
}

/* BACK SIDE */
.back{
    transform:rotateY(180deg);
}

/* 3D ROTATING LOGO */
.logo{
    width:120px;
    animation:rotate3d 4s linear infinite;
    margin-bottom:15px;
}

/* TITLE */
h1{
    font-size:22px;
    text-align:center;
    letter-spacing:1px;
}

.tagline{
    font-size:13px;
    opacity:0.9;
    margin-top:6px;
}

/* SCAN LINE */
.scan-line{
    position:absolute;
    width:100%;
    height:4px;
    background:white;
    animation:scan 2s linear infinite;
    opacity:0.8;
}

/* ANIMATIONS */
@keyframes rotate3d{
    from{ transform:rotateY(0deg); }
    to{ transform:rotateY(360deg); }
}

@keyframes scan{
    0%{ top:0; }
    100%{ top:100%; }
}

@keyframes flipReveal{
    0%{ transform:rotateY(90deg); opacity:0; }
    100%{ transform:rotateY(0deg); opacity:1; }
}

/* FADE OUT */
.fade-out{
    animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
    to{ opacity:0; transform:scale(1.2); }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <div class="card" id="cardBox">
        <div class="front">
            <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" class="logo">
            <h1>Smart AR Shopping</h1>
            <div class="tagline">Experience Shopping in Augmented Reality</div>
            <div class="scan-line"></div>
        </div>
        <div class="back">
            <h1>Launching Experience...</h1>
        </div>
    </div>
</div>

<audio autoplay>
<source src="https://assets.mixkit.co/sfx/preview/mixkit-modern-technology-select-3124.mp3">
</audio>

<script>
// PARTICLES (now white instead of cyan)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*1
    });
}

function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    particles.forEach(p=>{
        p.y += p.speed;
        if(p.y > canvas.height) p.y=0;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// AUTO REDIRECT
setTimeout(()=>{
    document.getElementById("cardBox").classList.add("fade-out");
},2200);

setTimeout(()=>{
    window.location.href="register.html";
},3000);
</script>

</body>
</html>
