<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View in AR - Smart AR Shopping</title>
  
  <!-- iOS AR Quick Look -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="data:application/json;base64,eyJzaG9ydF9uYW1lIjoiQVIgVmlldyIsIm5hbWUiOiJBUiBWaWV3Iiwic3RhcnQ_ url">
  
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: #1a1a2e;
      overflow: hidden;
    }
    
    /* AR Container */
    .ar-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 107, 216, 0.3);
      border-top: 4px solid #ff6fd8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: white;
      margin-top: 20px;
      font-size: 16px;
      letter-spacing: 1px;
    }
    
    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 50;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      text-decoration: none;
    }
    
    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }
    
    .back-btn svg {
      width: 18px;
      height: 18px;
    }
    
    /* AR Instructions */
    .ar-instructions {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px 25px;
      border-radius: 30px;
      font-size: 14px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.5s ease;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    /* AR Button Styles */
    model-viewer {
      --poster-color: transparent;
    }
    
    /* Model Viewer Customization */
    #arModel {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    
    /* Hide default AR button and customize */
    #arModel::part(default-ar-button) {
      background: linear-gradient(135deg, #ff6fd8, #8e2de2);
      border-radius: 30px;
      padding: 12px 24px;
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader"></div>
    <p class="loading-text">Loading 3D Model...</p>
  </div>

  <!-- Back Button -->
  <a href="javascript:history.back()" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back to Product
  </a>

  <!-- AR Viewer -->
  <div class="ar-container">
    <model-viewer
      id="arModel"
      src=""
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      auto-rotate
      rotate-auto="true"
      shadow-intensity="1"
      shadow-color="#000000"
      environment-image="neutral"
      exposure="1"
      scale="1 1 1"
      min-scale="0.5"
      max-scale="3"
      poster=""
      loading="eager"
      revealed
    >
      <!-- AR Instructions -->
      <div class="ar-instructions" slot="ar-prompt">
        <p>Move your phone to detect surfaces, then tap to place the product</p>
      </div>
    </model-viewer>
  </div>

  <!-- AR Instructions Bottom -->
  <div class="ar-instructions" id="instructions">
    <p>📱 Move your device to scan the floor/table</p>
    <p style="font-size: 12px; margin-top: 5px; opacity: 0.8;">Tap on a surface to place the product</p>
  </div>

  <script>
    // Get model path from URL parameter
    const params = new URLSearchParams(window.location.search);
    const modelPath = params.get("model");
    
    const modelViewer = document.getElementById("arModel");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const instructions = document.getElementById("instructions");
    
    // Set the model source
    if (modelPath) {
      modelViewer.src = modelPath;
      console.log("Loading model:", modelPath);
    } else {
      loadingOverlay.innerHTML = `
        <p class="loading-text" style="color: #ff6fd8;">No model specified!</p>
        <a href="catalog.html" class="back-btn" style="margin-top: 20px;">Go to Catalog</a>
      `;
    }
    
    // Hide loading overlay when model is ready
    modelViewer.addEventListener("load", () => {
      console.log("Model loaded successfully!");
      loadingOverlay.classList.add("hidden");
      
      // Hide instructions after 5 seconds
      setTimeout(() => {
        instructions.style.opacity = "0";
        instructions.style.transition = "opacity 0.5s ease";
      }, 5000);
    });
    
    // Handle AR session start
    modelViewer.addEventListener("ar-session-start", () => {
      console.log("AR session started");
      instructions.innerHTML = "<p>👆 Tap on a surface to place the product</p>";
    });
    
    // Handle AR session end
    modelViewer.addEventListener("ar-session-end", () => {
      console.log("AR session ended");
      instructions.innerHTML = `
        <p>📱 Move your device to scan the floor/table</p>
        <p style="font-size: 12px; margin-top: 5px; opacity: 0.8;">Tap on a surface to place the product</p>
      `;
      instructions.style.opacity = "1";
    });
    
    // Error handling
    modelViewer.addEventListener("error", (e) => {
      console.error("Error loading model:", e);
      loadingOverlay.innerHTML = `
        <p class="loading-text" style="color: #ff6fd8;">Error loading 3D model!</p>
        <a href="javascript:history.back()" class="back-btn" style="margin-top: 20px;">Go Back</a>
      `;
    });
  </script>
</body>
</html>
